<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TenantKit — Row-level multi-tenancy for Rails">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b1030"/>
      <stop offset="0.55" stop-color="#2a1450"/>
      <stop offset="1" stop-color="#3a1d5e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7a59"/>
      <stop offset="1" stop-color="#e9573f"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="28" fill="url(#bg)"/>

  <!-- faint grid dots -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="1120" cy="60" r="3"/><circle cx="1160" cy="60" r="3"/><circle cx="1200" cy="60" r="3"/>
    <circle cx="1120" cy="100" r="3"/><circle cx="1160" cy="100" r="3"/><circle cx="1200" cy="100" r="3"/>
    <circle cx="1120" cy="140" r="3"/><circle cx="1160" cy="140" r="3"/><circle cx="1200" cy="140" r="3"/>
  </g>

  <!-- tenant stack glyph: three offset cards, each with a "row" highlighted -->
  <g transform="translate(96,88)" filter="url(#soft)">
    <rect x="26" y="0"  width="150" height="52" rx="12" fill="#ffffff" opacity="0.16"/>
    <rect x="13" y="46" width="150" height="52" rx="12" fill="#ffffff" opacity="0.28"/>
    <rect x="0"  y="92" width="150" height="52" rx="12" fill="#20143a" stroke="url(#teal)" stroke-width="2"/>
    <!-- the scoped row -->
    <rect x="14" y="108" width="92" height="8" rx="4" fill="url(#accent)"/>
    <rect x="14" y="124" width="60" height="6" rx="3" fill="#8b7bb3"/>
    <circle cx="128" cy="118" r="9" fill="url(#teal)"/>
  </g>

  <!-- wordmark -->
  <text x="320" y="150" font-family="'DejaVu Sans','Segoe UI',Arial,sans-serif" font-size="82" font-weight="700" fill="#ffffff" letter-spacing="-1">Tenant<tspan fill="url(#accent)">Kit</tspan></text>

  <!-- tagline -->
  <text x="322" y="200" font-family="'DejaVu Sans','Segoe UI',Arial,sans-serif" font-size="27" font-weight="400" fill="#c9bce6">Row-level multi-tenancy for Rails — <tspan fill="#ffffff" font-weight="700">strict by default</tspan>.</text>

  <!-- meta chips -->
  <g font-family="'DejaVu Sans','Segoe UI',Arial,sans-serif" font-size="19" font-weight="700">
    <rect x="322" y="228" width="150" height="38" rx="19" fill="#ffffff" opacity="0.08"/>
    <text x="345" y="253" fill="#e8def7">Rails ≥ 7.2</text>
    <rect x="484" y="228" width="152" height="38" rx="19" fill="#ffffff" opacity="0.08"/>
    <text x="507" y="253" fill="#e8def7">Ruby ≥ 3.3</text>
    <rect x="648" y="228" width="220" height="38" rx="19" fill="#ffffff" opacity="0.08"/>
    <text x="671" y="253" fill="#e8def7">Job propagation</text>
    <rect x="880" y="228" width="80" height="38" rx="19" fill="#ffffff" opacity="0.08"/>
    <text x="903" y="253" fill="#e8def7">MIT</text>
  </g>
</svg>
